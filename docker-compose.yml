services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: calitrack
      POSTGRES_USER: calitrack
      POSTGRES_PASSWORD: calitrack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calitrack -d calitrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/calitrack
      SPRING_DATASOURCE_USERNAME: calitrack
      SPRING_DATASOURCE_PASSWORD: calitrack
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
